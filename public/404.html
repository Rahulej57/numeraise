<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Numeraise</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        body { font-family: system-ui, sans-serif; text-align: center; padding: 60px 20px; max-width: 600px; margin: 0 auto; }
        h1 { font-size: 48px; margin-bottom: 20px; }
        .calculators { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 30px; }
        .calculators a { background: #f0f0f0; padding: 10px 20px; border-radius: 8px; text-decoration: none; color: #333; }
        input { padding: 12px; width: 80%; margin: 20px 0; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>Oops! The page you're looking for doesn't exist.</p>
    <input type="text" placeholder="Search for a calculator..." id="search" onkeyup="if(event.keyCode===13){window.location.href='/search?q='+this.value}">
    <div class="calculators">
        <a href="/calculators/sip-calculator">SIP Calculator</a>
        <a href="/calculators/emi-calculator">EMI Calculator</a>
        <a href="/calculators/fd-calculator">FD Calculator</a>
        <a href="/calculators/income-tax-calculator">Income Tax Calculator</a>
        <a href="/">Return to Home</a>
    </div>
    <script>
        document.getElementById('search').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') {
                window.location.href = '/calculators?q=' + encodeURIComponent(this.value);
            }
        });
    </script>
</body>
</html>
